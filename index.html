<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SundaSmart V6</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 50px 20px; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; border: 2px solid #4caf50; }
        button { background: #ffa000; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🌿 SundaSmart</h1>
        <p>Aplikasi Budaya Bogor</p>
        <div id="loginSection">
            <button onclick="loginGoogle()">MASUK DENGAN GOOGLE</button>
        </div>
        <div id="homeSection" style="display:none;">
            <h2 id="greet"></h2>
            <p>Wilujeng Sumping di Sundasmart!</p>
        </div>
    </div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCJomw3JHyUdncNlghrqjVedVO6UKelTY0",
      authDomain: "sundasmart-7e792.firebaseapp.com",
      projectId: "sundasmart-7e792",
      storageBucket: "sundasmart-7e792.firebasestorage.app",
      messagingSenderId: "1004706509586",
      appId: "1:1004706509586:web:091f09c916079362a2f9cb"
    };

    firebase.initializeApp(firebaseConfig);

    function loginGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        firebase.auth().signInWithPopup(provider).then((res) => {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('homeSection').style.display = 'block';
            document.getElementById('greet').innerText = "Sampurasun, " + res.user.displayName + "!";
        }).catch((err) => {
            alert("Gagal: " + err.message);
        });
    }
</script>
</body>
</html>
