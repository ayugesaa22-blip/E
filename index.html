<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SundaSmart V6 - Guest Mode</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        :root { --primary: #1b5e20; --accent: #ffa000; --bg: #0f172a; }
        body { font-family: sans-serif; background: var(--bg); color: white; text-align: center; padding: 40px 20px; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; border: 2px solid var(--primary); max-width: 400px; margin: auto; }
        button { border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 14px; }
        .btn-google { background: white; color: #444; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-guest { background: var(--accent); color: white; }
        .hidden { display: none; }
        .status-badge { background: #334155; padding: 5px 10px; border-radius: 5px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🌿 SundaSmart</h1>
        <p>Aplikasi Budaya Bogor</p>
        
        <div id="loginSection">
            <button class="btn-google" onclick="loginGoogle()">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18"> Masuk dengan Google
            </button>
            <div style="margin: 15px 0; color: #64748b; font-size: 12px;">— ATAU —</div>
            <button class="btn-guest" onclick="loginGuest()">Masuk sebagai Tamu</button>
        </div>

        <div id="homeSection" class="hidden">
            <div class="status-badge" id="userStatus">Status: Tamu</div>
            <h2 id="greet">Sampurasun!</h2>
            <p>Wilujeng Sumping di SundaSmart. Sekarang lo bisa akses fitur budaya Bogor!</p>
            <button onclick="location.reload()" style="background:#ef4444; color:white;">Keluar</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCJomw3JHyUdncNlghrqjVedVO6UKelTY0",
      authDomain: "sundasmart-7e792.firebaseapp.com",
      projectId: "sundasmart-7e792",
      storageBucket: "sundasmart-7e792.firebasestorage.app",
      messagingSenderId: "1004706509586",
      appId: "1:1004706509586:web:091f09c916079362a2f9cb"
    };

    firebase.initializeApp(firebaseConfig);

    // Fungsi Login Google
    function loginGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        firebase.auth().signInWithPopup(provider).then((res) => {
            showHome("Sampurasun, " + res.user.displayName + "!", "Member");
        }).catch((err) => { alert("Gagal: " + err.message); });
    }

    // Fungsi Login Guest
    function loginGuest() {
        showHome("Sampurasun, Tamu!", "Guest");
    }

    function showHome(message, status) {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('homeSection').classList.remove('hidden');
        document.getElementById('greet').innerText = message;
        document.getElementById('userStatus').innerText = "Status: " + status;
    }
</script>
</body>
</html>
